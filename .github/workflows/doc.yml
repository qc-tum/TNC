# This workflow runs for pushes to main. It runs the following jobs:
# - build-doc: builds the documentation
# - build-book: builds the book
# - cleanup: cleans all previous deployments to GitHub Pages
# - deploy: deploys the documentation and book to GitHub Pages
permissions:
  contents: read
on:
  push:
    branches: [main]
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
name: docs
jobs:
  build-doc:
    runs-on: ubuntu-latest
    steps:
      - name: Install system requirements
        run: |
          sudo apt-get update
          sudo apt-get install -y libhdf5-dev openmpi-bin libopenmpi-dev libboost-program-options-dev
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
        with:
          submodules: true
      - name: Install stable
        uses: actions-rust-lang/setup-rust-toolchain@150fca883cd4034361b621bd4e6a9d34e5143606 # tag=v1.15.4
        with:
          toolchain: stable
      - name: cargo doc --no-deps
        run: cargo doc --no-deps
      - name: Add redirect
        run: echo '<meta http-equiv="refresh" content="0;url=tnc/index.html">' > target/doc/index.html
      - name: Upload doc artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # tag=v7.0.0
        with:
          name: doc
          path: target/doc
  build-book:
    runs-on: ubuntu-latest
    needs: build-doc
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # tag=v6.0.2
        with:
          submodules: true
      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@ee69d230fe19748b7abf22df32acaa93833fad08 # tag=v2.0.0
        with:
          mdbook-version: 0.5.2
      - name: Install mbBook-linkcheck2
        uses: taiki-e/install-action@bfadeaba214680fb4ab63e710bcb2a6a17019fdc # tag=v2.70.4
        with:
          tool: mdbook-linkcheck2
      - name: Download doc artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # tag=v8.0.1
        with:
          name: doc
          path: book/src/doc
      - name: Build book
        run: mdbook build book
      - name: Upload artifacts folder
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # tag=v4.0.0
        id: deployment
        with:
          path: book/book/html
  cleanup:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    permissions: write-all
    needs: build-book
    steps:
      - name: Delete previous deployments
        uses: strumwolf/delete-deployment-environment@a4825dd9648c57da8437a4885c3fcad58beac69c # tag=v3.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: github-pages
          onlyRemoveDeployments: true
  deploy:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    needs: cleanup
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # tag=v5.0.0
